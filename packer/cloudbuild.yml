# Monthly Windows image hardening pipeline.
substitutions:
  _PROJECT_ID: "big-mender-473219-r2"
  _ZONE: "us-east4-c"
  _IMAGE_FAMILY: "pww-windows-2022-hardened"
  _SOURCE_IMAGE: "ws2022"
  _WINRM_SECRET: "packer-winrm-password"
  _PACKER_TEMPLATE: "harden_ww.pkr.hcl"
  _PACKER_VERSION: "1.9.4"
  _PACKER_PLUGIN_VERSION: "1.1.6"
  _HARDENING_SOURCE_DIR: "./scripts/windows/"
  _HARDENING_TARGET_DIR: "C:/hardening"

steps:
- id: 'llm-cost-estimation'
  name: 'gcr.io/cloud-builders/gcloud'
  entrypoint: bash
  args:
  - -c
  - |
      echo "LLM cost estimation: not-provided"
  dir: 'packer'

- id: 'trivy-fs-scan'
  name: 'gcr.io/cloud-builders/gcloud'
  entrypoint: bash
  args:
  - -c
  - |
      set -euo pipefail
      apt-get update -y
      apt-get install -y wget gnupg lsb-release
      wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor -o /usr/share/keyrings/trivy.gpg
      echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $$(lsb_release -sc) main" > /etc/apt/sources.list.d/trivy.list
      apt-get update -y
      apt-get install -y trivy
      trivy --version
      trivy fs --no-progress --severity HIGH,CRITICAL --exit-code 1 .
  dir: 'packer'

- id: 'packer-init'
  name: 'hashicorp/packer:${_PACKER_VERSION}'
  entrypoint: sh
  args:
  - -c
  - |
      packer init ${_PACKER_TEMPLATE}
  dir: 'packer'

- id: 'packer-validate'
  name: 'hashicorp/packer:${_PACKER_VERSION}'
  entrypoint: sh
  args:
  - -c
  - |
      packer validate \
        -var "project_id=${_PROJECT_ID}" \
        -var "source_image_project_id=windows-cloud" \
        -var "source_image_family=windows-2022" \
        -var "service_account_email=packer-win-sa@${_PROJECT_ID}.iam.gserviceaccount.com" \
        -var "image_family=${_IMAGE_FAMILY}" \
        -var "machine_type=e2-standard-8" \
        -var "zone=${_ZONE}" \
        -var "hardening_source_dir=${_HARDENING_SOURCE_DIR}" \
        -var "hardening_target_dir=${_HARDENING_TARGET_DIR}" \
        -var "hardening_entry_script=run_all.ps1" \
        ${_PACKER_TEMPLATE}
  dir: 'packer'

- id: 'packer-build'
  name: 'hashicorp/packer:${_PACKER_VERSION}'
  entrypoint: sh
  args:
  - -c
  - |
      # Fetch PACKER_PW from Secret Manager
      PACKER_PW=$$(gcloud secrets versions access latest \
        --project "${_PROJECT_ID}" \
        --secret  "${_WINRM_SECRET}")

      export PACKER_LOG=1
      export PACKER_PW="$${PACKER_PW}"
      export SRC_IMG_NAME="${_SOURCE_IMAGE}"

      packer build \
        -var "project_id=${_PROJECT_ID}" \
        -var "source_image_project_id=windows-cloud" \
        -var "source_image_family=windows-2022" \
        -var "service_account_email=packer-win-sa@${_PROJECT_ID}.iam.gserviceaccount.com" \
        -var "image_family=${_IMAGE_FAMILY}" \
        -var "machine_type=e2-standard-8" \
        -var "zone=${_ZONE}" \
        -var "hardening_source_dir=${_HARDENING_SOURCE_DIR}" \
        -var "hardening_target_dir=${_HARDENING_TARGET_DIR}" \
        -var "hardening_entry_script=run_all.ps1" \
        ${_PACKER_TEMPLATE}
  dir: 'packer'

serviceAccount: "packer-win-sa@${_PROJECT_ID}.iam.gserviceaccount.com"

options:
  logging: CLOUD_LOGGING_ONLY
