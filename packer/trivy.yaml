substitutions:
  _PROJECT_ID: "big-mender-473219-r2"
  _ZONE: "us-east4-b"
  _IMAGE_NAME: "pww-disa--hardened-patched-1772125065"
  _SCAN_MACHINE_TYPE: "e2-medium"
  _SCAN_RESULTS_BUCKET: "osconfig-scan-results-big-mender-473219-r2"

steps:
- id: 'trivy-scan-only'
  name: 'gcr.io/cloud-builders/gcloud'
  timeout: 1800s
  entrypoint: bash
  args:
  - -euo
  - pipefail
  - -c
  - |
      SCAN_VM="trivy-scan-${BUILD_ID}"
      REPORT_GCS_PATH="gs://${_SCAN_RESULTS_BUCKET}/${BUILD_ID}/trivy-report.json"

      echo "Creating startup script..."

      printf '%s\n' \
        '$ErrorActionPreference = "Stop"' \
        '' \
        'Invoke-WebRequest -Uri https://github.com/aquasecurity/trivy/releases/download/v0.50.0/trivy_0.50.0_windows-64bit.zip -OutFile C:\trivy.zip' \
        'Expand-Archive C:\trivy.zip -DestinationPath C:\trivy -Force' \
        '' \
        'C:\trivy\trivy.exe rootfs C:\ --format json --output C:\trivy-report.json' \
        '' \
        "gsutil cp C:\\trivy-report.json ${REPORT_GCS_PATH}" \
        > /workspace/startup.ps1

      echo "Booting scan VM..."
      gcloud compute instances create "$$SCAN_VM" \
        --project="${_PROJECT_ID}" \
        --zone="${_ZONE}" \
        --machine-type="${_SCAN_MACHINE_TYPE}" \
        --image="${_IMAGE_NAME}" \
        --image-project="${_PROJECT_ID}" \
        --service-account="packer-win-sa@${_PROJECT_ID}.iam.gserviceaccount.com" \
        --scopes="cloud-platform" \
        --metadata-from-file windows-startup-script-ps1=/workspace/startup.ps1 \
        --boot-disk-size=250GB

      echo "Waiting for report (max 20 min)..."
      SUCCESS=false
      for i in {1..40}; do
        if gsutil -q stat "${REPORT_GCS_PATH}"; then
          SUCCESS=true
          break
        fi
        sleep 30
      done

      echo "Deleting VM..."
      gcloud compute instances delete "$$SCAN_VM" \
        --zone="${_ZONE}" \
        --quiet || true

      if [ "$$SUCCESS" != "true" ]; then
        echo "Scan failed — report not found."
        exit 1
      fi

      echo "Scan completed."
      echo "Report stored at: ${REPORT_GCS_PATH}"

serviceAccount: "projects/big-mender-473219-r2/serviceAccounts/packer-win-sa@big-mender-473219-r2.iam.gserviceaccount.com"

options:
  logging: CLOUD_LOGGING_ONLY
