# Standalone Trivy scan pipeline.
# Scans the Packer HCL template and scripts directory for:
#   - Misconfigurations (trivy config)
#   - Exposed secrets / hardcoded credentials (trivy fs --scanners secret)
#   - Known vulnerable dependencies (trivy fs --scanners vuln)
#
# No image export needed — runs directly against source files.
# Fast: completes in under 2 minutes.

substitutions:
  _TRIVY_VERSION: "0.50.1"
  _SEVERITY: "HIGH,CRITICAL"

steps:

# --------------------------------------------------------
# Trivy Config Scan
# Scans Packer HCL file for infrastructure misconfigurations
# --------------------------------------------------------
- id: 'trivy-config-scan'
  name: 'gcr.io/cloud-builders/gcloud'
  entrypoint: bash
  args:
  - -c
  - |
      set -euo pipefail

      echo "=== Installing Trivy v${_TRIVY_VERSION} ==="
      apt-get update -y -qq
      apt-get install -y -qq curl
      curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
        | sh -s -- -b /usr/local/bin v${_TRIVY_VERSION}
      trivy --version

      echo ""
      echo "=== Trivy Config Scan — Packer HCL ==="
      echo "    Scanning for misconfigurations in .hcl files..."
      trivy config \
        --severity ${_SEVERITY} \
        --exit-code 0 \
        --format table \
        . || true

      echo ""
      echo "=== Trivy Filesystem Scan — Secrets ==="
      echo "    Scanning for hardcoded secrets and credentials..."
      trivy fs \
        --scanners secret \
        --severity ${_SEVERITY} \
        --exit-code 0 \
        --format table \
        . || true

      echo ""
      echo "=== Trivy Filesystem Scan — Vulnerabilities ==="
      echo "    Scanning for vulnerable dependencies..."
      trivy fs \
        --scanners vuln \
        --severity ${_SEVERITY} \
        --exit-code 0 \
        --format table \
        . || true

      echo ""
      echo "=== Trivy scan complete ==="
  dir: 'packer'

serviceAccount: "packer-win-sa@big-mender-473219-r2.iam.gserviceaccount.com"

options:
  logging: CLOUD_LOGGING_ONLY
